name: CI

# Pull Request 提前反馈，main 上的 push 验证最终集成结果。
on:
  pull_request:
  push:
    branches:
      - main

# 门禁只读取仓库内容，不授予写入权限。
permissions:
  contents: read

# 同一引用有新提交时取消旧运行，避免浪费 CI 资源和展示过期结果。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # 两个平台独立运行，尽早暴露平台相关的构建和测试差异。
        os:
          - macos-latest
          - ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          # action 只负责安装；实际命令统一由 Makefile 定义。
          install-only: true

      - name: Run project checks
        # Makefile 是本地与 CI 的唯一门禁入口；构建产物无需保留在工作区。
        run: make check BINARY="$RUNNER_TEMP/dot"
