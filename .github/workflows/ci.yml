name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Go (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          install-only: true

      - name: Verify dependencies
        run: make tidy-check

      - name: Check formatting
        run: make fmt-check

      - name: Run static analysis
        run: make lint

      - name: Run tests with race detector
        run: make test-race

      - name: Build CLI
        run: make build BINARY="$RUNNER_TEMP/dot"
